apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-results-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-results
  template:
    metadata:
      labels:
        app: student-results
    spec:
      containers:
      - name: student-results-container
        image: yashmitha05/html-demo:latest # Ensure this matches your Build stage tag
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: student-results-service
spec:
  type: NodePort
  selector:
    app: student-results
  ports:
    - port: 80
      targetPort: 80 # Changed from 89 to 80 to match Nginx
      nodePort: 30007 
