apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-results-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-results
  template:
    metadata:
      labels:
        app: student-results
    spec:
      containers:
      - name: student-results-container
        image: <your-docker-id>/student-results-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: student-results-service
spec:
  type: NodePort
  selector:
    app: student-results
  ports:
    - port: 80
      targetPort: 89
      nodePort: 30007 
